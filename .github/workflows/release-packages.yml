name: Release packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Distribution version, for example 2026.05.001'
        required: true
        type: string
      toycore_ref:
        description: 'Toycore ref to package'
        required: true
        default: 'main'
        type: string
      module_ref:
        description: 'Optional shared official module ref. Empty uses module-index latest_version tags or default branches.'
        required: false
        default: ''
        type: string

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Toycore
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.toycore_ref }}
          path: toycore

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Checkout official modules
        run: php .tools/bin/clone-official-modules.php ..
        working-directory: toycore
        env:
          TOYCORE_MODULE_REF: ${{ inputs.module_ref }}

      - name: Run checks
        run: ./.tools/bin/check
        working-directory: toycore

      - name: Package distributions
        run: ./.tools/bin/package-distributions "${{ inputs.version }}"
        working-directory: toycore

      - name: Check distributions
        run: php .tools/bin/check-distributions.php "${{ inputs.version }}"
        working-directory: toycore

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toycore-distributions-${{ inputs.version }}
          path: |
            toycore/dist/toycore-*
